[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "qinglong-captions"
version = "4.4.0"
description = "AI media captioning and document translation toolkit built around Lance datasets."
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "av",
    "pylance>=6.0.1",
    "rich",
    "rich_pixels",
    "pandas",
    "pillow>=11.3",
    "pillow-heif",
    "pillow-jxl-plugin",
    "pysrt",
    "toml",
    "imageio>=2.37.3",
    "imageio-ffmpeg>=0.6.0",
    "pymediainfo",
    "mutagen",
    "mistralai>=2.4.7",
    "google-genai>=2.6.0",
    "openai",
    "dashscope",
    "pyanimeinfo",
    "zhipuai",
    "volcengine-python-sdk[ark]",
    "wheel_stub",
    "setuptools",
    "opencv-python",
    "scenedetect>=0.7",
    "nicegui[native]",
    "tomlkit",
]

[project.optional-dependencies]
torch-base = [
    "torch==2.12.1",
    "torchvision",
    "accelerate",
    "huggingface_hub[hf_xet]>=0.35.2",
    "safetensors",
]
onnx-base = [
    "qinglong-captions[torch-base]",
    "onnxruntime-gpu>=1.24.4; sys_platform == 'win32'",
    "onnxruntime-gpu>=1.20.2; sys_platform == 'linux'",
    "tensorrt-cu13==10.16.1.11",
]
video-split = [
    "numpy<2",
]
image-align = [
    "qinglong-captions[torch-base]",
    "vismatch",
]
reward-model = [
    "qinglong-captions[torch-base]",
    "pillow>=11.3",
    "transformers[serving]==4.57.6",
    "scipy",
    "imscore",
]
translate = [
    "docling",
    "markitdown[all]",
    "sentencepiece",
    "qinglong-captions[torch-base]",
    "transformers[serving]>=5.6.0",
    "compressed-tensors>=0.14.0",
    "matplotlib",
    "einops",
    "addict",
    "easydict",
    "flash-attn==2.8.4; sys_platform == 'linux'",
    "triton-windows; sys_platform == 'win32'",
    "flash-attn==2.8.4; sys_platform == 'win32' and python_version == '3.11'",
    "PyMuPDF",
    "img2pdf",
]
see-through = [
    "numpy<2",
    "qinglong-captions[torch-base]",
    "qinglong-captions[psdexport]",
    "diffusers>=0.35.1",
    "transformers[serving]>=4.56.0",
    "bitsandbytes>=0.43.2",
    "opencv-python",
    "PyYAML",
    "scikit-learn",
    "flash-attn==2.8.4; sys_platform == 'linux'",
    "triton-windows; sys_platform == 'win32'",
    "flash-attn==2.8.4; sys_platform == 'win32' and python_version == '3.11'",
]
wdtagger = [
    "pillow>=11.3",
    "opencv-contrib-python; sys_platform == 'win32'",
    "opencv-contrib-python; sys_platform == 'linux'",
    "qinglong-captions[onnx-base]",
]
wdtagger-cl-tagger-v2 = [
    "pillow>=11.3",
    "qinglong-captions[onnx-base]",
    "transformers[serving]>=4.56.0",
]
moondream = [
    "qinglong-captions[torch-base]",
    "transformers[serving]>=4.44.0",
    "accelerate>=0.34.0",
    "Pillow>=9.5.0",
]
olmocr = [
    "qinglong-captions[torch-base]",
    "transformers[serving]>=4.44.0",
    "accelerate>=0.34.0",
    "Pillow>=9.5.0",
    "sentencepiece>=0.1.99",
    "flash-attn==2.8.4; sys_platform == 'linux'",
    "triton-windows; sys_platform == 'win32'",
    "flash-attn==2.8.4; sys_platform == 'win32' and python_version == '3.11'",
    "olmocr; python_version >= '3.11'",
    "PyMuPDF",
    "img2pdf",
]
paddleocr = [
    "qinglong-captions[paddleocr-onnx]",
]
paddleocr-onnx = [
    "qinglong-captions[onnx-base]",
    "paddleocr>=3.7.0",
]
paddleocr-native = [
    "rich>=14.3.1",
    "pillow",
    "pyarrow",
    "numpy",
    "setuptools<75",
    "paddlepaddle-gpu @ https://paddle-whl.bj.bcebos.com/nightly/cu129/paddlepaddle-gpu/paddlepaddle_gpu-3.4.0.dev20260129-cp310-cp310-linux_x86_64.whl ; sys_platform == 'linux' and python_version == '3.10'",
    "paddlepaddle-gpu @ https://paddle-whl.bj.bcebos.com/nightly/cu129/paddlepaddle-gpu/paddlepaddle_gpu-3.4.0.dev20260129-cp310-cp310-win_amd64.whl ; sys_platform == 'win32' and python_version == '3.10'",
    "paddlepaddle-gpu @ https://paddle-whl.bj.bcebos.com/nightly/cu129/paddlepaddle-gpu/paddlepaddle_gpu-3.4.0.dev20260129-cp311-cp311-linux_x86_64.whl ; sys_platform == 'linux' and python_version == '3.11'",
    "paddlepaddle-gpu @ https://paddle-whl.bj.bcebos.com/nightly/cu129/paddlepaddle-gpu/paddlepaddle_gpu-3.4.0.dev20260129-cp311-cp311-win_amd64.whl ; sys_platform == 'win32' and python_version == '3.11'",
    "paddlepaddle-gpu @ https://paddle-whl.bj.bcebos.com/nightly/cu129/paddlepaddle-gpu/paddlepaddle_gpu-3.4.0.dev20260129-cp312-cp312-linux_x86_64.whl ; sys_platform == 'linux' and python_version == '3.12'",
    "paddlepaddle-gpu @ https://paddle-whl.bj.bcebos.com/nightly/cu129/paddlepaddle-gpu/paddlepaddle_gpu-3.4.0.dev20260129-cp312-cp312-win_amd64.whl ; sys_platform == 'win32' and python_version == '3.12'",
    "paddleocr[doc-parser]",
    "safetensors==0.7.0",
]
psdexport = [
    "psd-tools[composite]",
]
deepseek-ocr = [
    "qinglong-captions[torch-base]",
    "transformers[serving]==4.46.3",
    "tokenizers==0.20.3",
    "matplotlib",
    "einops",
