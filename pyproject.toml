[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "qinglong-captions"
version = "4.1.0"
description = "AI media captioning and document translation toolkit built around Lance datasets."
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "av",
    "pylance>=2.0.1",
    "rich",
    "rich_pixels",
    "pandas",
    "pillow-heif",
    "pillow-jxl-plugin",
    "pysrt",
    "toml",
    "imageio>=2.31.1",
    "imageio-ffmpeg>=0.4.8",
    "pymediainfo",
    "mutagen",
    "mistralai>=1.9.11",
    "google-genai>=1.52.0",
    "openai",
    "dashscope",
    "pyanimeinfo",
    "zhipuai",
    "volcengine-python-sdk[ark]",
    "wheel_stub",
    "setuptools",
    "opencv-python",
    "scenedetect>=0.6.6",
    "psd-tools",
    "nicegui",
    "tomlkit",
]

[project.optional-dependencies]
translate = [
    "docling",
    "markitdown[all]",
    "sentencepiece",
    "torch==2.8.0",
    "torchvision",
    "accelerate",
    "transformers[serving]==4.56.0",
    "huggingface_hub[hf_xet]>=0.35.2",
    "matplotlib",
    "einops",
    "addict",
    "easydict",
    "flash-attn==2.8.3; sys_platform == 'linux'",
    "triton-windows; sys_platform == 'win32'",
    "flash-attn @ https://github.com/sdbds/flash-attention-for-windows/releases/download/2.8.3/flash_attn-2.8.3+cu128torch2.8.0cxx11abiFALSEfullbackward-cp311-cp311-win_amd64.whl ; sys_platform == 'win32' and python_version == '3.11'",
    "safetensors",
    "PyMuPDF",
    "img2pdf",
]
wdtagger = [
    "pillow>=11.3",
    "opencv-contrib-python @ https://github.com/cudawarped/opencv-python-cuda-wheels/releases/download/4.12.0.88/opencv_contrib_python-4.12.0.88-cp37-abi3-win_amd64.whl ; sys_platform == 'win32'",
    "opencv-contrib-python; sys_platform == 'linux'",
    "onnxruntime-gpu==1.20.2; sys_platform == 'win32'",
    "onnxruntime-gpu>=1.20.2; sys_platform == 'linux'",
    "torch>=2.8.0",
    "torchvision",
    "accelerate",
    "transformers>=4.57",
    "huggingface_hub[hf_xet]>=0.35.2",
]
wdtagger-tensorrt = [
    "tensorrt==10.9.0.34",
]
moondream = [
    "torch==2.8.0",
    "transformers[serving]>=4.44.0",
    "accelerate>=0.34.0",
    "Pillow>=9.5.0",
    "safetensors>=0.4.2",
]
olmocr = [
