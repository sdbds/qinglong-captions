[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "qinglong-captions"
version = "4.3.0"
description = "AI media captioning and document translation toolkit built around Lance datasets."
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "av",
    "pylance>=2.0.1",
    "rich",
    "rich_pixels",
    "pandas",
    "pillow-heif",
    "pillow-jxl-plugin",
    "pysrt",
    "toml",
    "imageio>=2.31.1",
    "imageio-ffmpeg>=0.4.8",
    "pymediainfo",
    "mutagen",
    "mistralai>=2.1.2",
    "google-genai>=1.52.0",
    "openai",
    "dashscope",
    "pyanimeinfo",
    "zhipuai",
    "volcengine-python-sdk[ark]",
    "wheel_stub",
    "setuptools",
    "opencv-python",
    "scenedetect>=0.6.6",
    "nicegui[native]",
    "tomlkit",
    "numpy<2",
]

[project.optional-dependencies]
torch-base = [
    "torch==2.11.0",
    "torchvision",
    "accelerate",
    "huggingface_hub[hf_xet]>=0.35.2",
    "safetensors",
]
onnx-base = [
    "qinglong-captions[torch-base]",
    "onnxruntime-gpu>=1.24.4; sys_platform == 'win32'",
    "onnxruntime-gpu>=1.20.2; sys_platform == 'linux'",
]
video-split = [
    "numpy<2",
]
image-align = [
    "vismatch",
]
translate = [
    "docling",
    "markitdown[all]",
    "sentencepiece",
    "qinglong-captions[torch-base]",
    "transformers[serving]==4.56.0",
    "matplotlib",
    "einops",
    "addict",
    "easydict",
    "flash-attn==2.8.4; sys_platform == 'linux'",
    "triton-windows; sys_platform == 'win32'",
    "flash-attn @ https://github.com/sdbds/flash-attention-for-windows/releases/download/2.8.4/flash_attn-2.8.4+cu130torch2.11.0cxx11abiFALSEfullbackward-cp311-cp311-win_amd64.whl ; sys_platform == 'win32' and python_version == '3.11'",
    "PyMuPDF",
    "img2pdf",
]
see-through = [
    "numpy<2",
    "qinglong-captions[torch-base]",
    "qinglong-captions[psdexport]",
    "diffusers>=0.35.1",
    "transformers[serving]>=4.56.0",
    "opencv-python",
    "PyYAML",
    "scikit-learn",
    "flash-attn==2.8.4; sys_platform == 'linux'",
    "triton-windows; sys_platform == 'win32'",
    "flash-attn @ https://github.com/sdbds/flash-attention-for-windows/releases/download/2.8.4/flash_attn-2.8.4+cu130torch2.11.0cxx11abiFALSEfullbackward-cp311-cp311-win_amd64.whl ; sys_platform == 'win32' and python_version == '3.11'",
]
wdtagger = [
    "pillow>=11.3",
    "opencv-contrib-python; sys_platform == 'win32'",
    "opencv-contrib-python; sys_platform == 'linux'",
    "qinglong-captions[onnx-base]",
]
wdtagger-tensorrt = [
    "tensorrt==10.9.0.34",
]
moondream = [
    "qinglong-captions[torch-base]",
    "transformers[serving]>=4.44.0",
    "accelerate>=0.34.0",
    "Pillow>=9.5.0",
]
olmocr = [
    "qinglong-captions[torch-base]",
    "transformers[serving]>=4.44.0",
    "accelerate>=0.34.0",
