[tool.uv.sources]
dots_ocr = { path = "third_party/dots.ocr", editable = true }

[tool.uv.extra-build-dependencies]
tensorrt-cu12-libs = ["wheel_stub"]
transformers = ["setuptools", "wheel"]
pysrt = ["setuptools", "wheel"]
bitmath = ["setuptools", "wheel"]

[tool.ruff]
line-length = 132
indent-width = 4
target-version = "py311"

[tool.ruff.lint]
# Select specific rule sets
select = ["E", "F", "W", "I"]
# Ignore all unused imports (including torch)
ignore = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
