name: Tests

on:
  push:
    branches: [main]
    paths:
      - "module/**"
      - "gui/**"
      - "utils/**"
      - "config/**"
      - "tests/**"
      - "third_party/**"
      - "*.ps1"
      - "*.sh"
      - ".github/scripts/**"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "module/**"
      - "gui/**"
      - "utils/**"
      - "config/**"
      - "tests/**"
      - "third_party/**"
      - "*.ps1"
      - "*.sh"
      - ".github/scripts/**"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  workflow_dispatch:

env:
  HF_HOME: huggingface
  HF_ENDPOINT: https://hf-mirror.com
  XFORMERS_FORCE_DISABLE_TRITON: "1"
  UV_EXTRA_INDEX_URL: https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/onnxruntime-cuda-13/pypi/simple/ https://download.pytorch.org/whl/cu130
  UV_NO_BUILD_ISOLATION: "1"
  UV_NO_CACHE: "0"
  UV_LINK_MODE: symlink
  UV_INDEX_STRATEGY: unsafe-best-match
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: "1"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  full-unit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          python -m pip install --upgrade pip uv wheel_stub setuptools wheel tomli
          if ($LASTEXITCODE -ne 0) { throw "install uv failed" }
          $RunnerPython = (Get-Command python).Source
          uv venv --python $RunnerPython
          if ($LASTEXITCODE -ne 0) { throw "uv venv failed" }
          $PythonExe = if ($IsWindows) {
            (Resolve-Path "./.venv/Scripts/python.exe").Path
          } else {
            (Resolve-Path "./.venv/bin/python").Path
          }
          uv pip install --python $PythonExe setuptools wheel wheel_stub
          if ($LASTEXITCODE -ne 0) { throw "uv pip bootstrap failed" }
          $IndexStrategy = if ([string]::IsNullOrWhiteSpace($env:UV_INDEX_STRATEGY)) { "unsafe-best-match" } else { $env:UV_INDEX_STRATEGY }
          $UvExportProjectDir = Join-Path $env:RUNNER_TEMP "qinglong-ci-test-project"
          Remove-Item $UvExportProjectDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $UvExportProjectDir | Out-Null
          $CiPyproject = Join-Path $UvExportProjectDir "pyproject.toml"
          python .github/scripts/render_ci_test_project.py --source pyproject.toml --output $CiPyproject
          if ($LASTEXITCODE -ne 0) { throw "render ci test project failed" }
          $RequirementsFile = Join-Path $env:RUNNER_TEMP "qinglong-ci-test-requirements.txt"
          uv export --project $UvExportProjectDir --python $RunnerPython --index-strategy $IndexStrategy --group test --no-emit-project --format requirements-txt --output-file $RequirementsFile
          if ($LASTEXITCODE -ne 0) { throw "uv export failed" }
          uv pip install --python $PythonExe --index-strategy $IndexStrategy -r $RequirementsFile
          if ($LASTEXITCODE -ne 0) { throw "uv pip install failed" }
          "VENV_PYTHON=$PythonExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run authoritative offline unit suite
        shell: pwsh
        run: |
          & $env:VENV_PYTHON -m pytest tests -q --strict-markers -m "not optional_runtime and not gpu and not network" --durations=25

  provider-v2:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          python -m pip install --upgrade pip uv wheel_stub setuptools wheel tomli
          if ($LASTEXITCODE -ne 0) { throw "install uv failed" }
          $RunnerPython = (Get-Command python).Source
          uv venv --python $RunnerPython
          if ($LASTEXITCODE -ne 0) { throw "uv venv failed" }
          $PythonExe = if ($IsWindows) {
            (Resolve-Path "./.venv/Scripts/python.exe").Path
          } else {
            (Resolve-Path "./.venv/bin/python").Path
          }
          uv pip install --python $PythonExe setuptools wheel wheel_stub
          if ($LASTEXITCODE -ne 0) { throw "uv pip bootstrap failed" }
          $IndexStrategy = if ([string]::IsNullOrWhiteSpace($env:UV_INDEX_STRATEGY)) { "unsafe-best-match" } else { $env:UV_INDEX_STRATEGY }
          $UvExportProjectDir = Join-Path $env:RUNNER_TEMP "qinglong-ci-test-project"
          Remove-Item $UvExportProjectDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $UvExportProjectDir | Out-Null
          $CiPyproject = Join-Path $UvExportProjectDir "pyproject.toml"
          python .github/scripts/render_ci_test_project.py --source pyproject.toml --output $CiPyproject
          if ($LASTEXITCODE -ne 0) { throw "render ci test project failed" }
          $RequirementsFile = Join-Path $env:RUNNER_TEMP "qinglong-ci-test-requirements.txt"
          uv export --project $UvExportProjectDir --python $RunnerPython --index-strategy $IndexStrategy --group test --no-emit-project --format requirements-txt --output-file $RequirementsFile
          if ($LASTEXITCODE -ne 0) { throw "uv export failed" }
          uv pip install --python $PythonExe --index-strategy $IndexStrategy -r $RequirementsFile
          if ($LASTEXITCODE -ne 0) { throw "uv pip install failed" }
          "VENV_PYTHON=$PythonExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run strict provider discovery gate
        shell: pwsh
        run: |
          & $env:VENV_PYTHON -c "from module.providers.registry import get_registry; reg = get_registry(); reg.discover(strict=True)"

      - name: Run Provider V2 suite
        shell: pwsh
        run: |
          & $env:VENV_PYTHON -m pytest tests/test_provider_v2.py tests/test_provider_registry.py tests/test_provider_routes.py tests/test_api_handler_v2.py -q --durations=20

  compatibility:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install declared test environment
        shell: pwsh
        run: .github/scripts/setup_ci_test_env.ps1

      - name: Run compatibility smoke suite
        shell: pwsh
        run: |
          & $env:VENV_PYTHON -m pytest tests -q --strict-markers -m compat

  static-correctness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install declared test environment
        shell: pwsh
        run: .github/scripts/setup_ci_test_env.ps1

      - name: Compile Python sources
        shell: pwsh
        run: |
          & $env:VENV_PYTHON -m compileall -q module gui utils config tests

      - name: Reject definite undefined names
        shell: pwsh
        run: |
          & $env:VENV_PYTHON -m ruff check module gui utils config tests --select F821,F823

      - name: Verify CI and isolation contracts
        shell: pwsh
        run: |
          & $env:VENV_PYTHON -m pytest tests/test_test_workflow.py tests/test_test_isolation_contract.py -q --strict-markers
