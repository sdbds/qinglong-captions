name: Tests

on:
  push:
    branches: [main]
    paths:
      - "module/providers/**"
      - "module/api_handler_v2.py"
      - "module/captioner.py"
      - "module/videospilter.py"
      - "module/lance*.py"
      - "utils/**"
      - "config/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "module/providers/**"
      - "module/api_handler_v2.py"
      - "module/captioner.py"
      - "module/videospilter.py"
      - "module/lance*.py"
      - "utils/**"
      - "config/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  workflow_dispatch:

env:
  HF_HOME: huggingface
  HF_ENDPOINT: https://hf-mirror.com
  XFORMERS_FORCE_DISABLE_TRITON: "1"
  UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cu128
  UV_NO_BUILD_ISOLATION: "1"
  UV_NO_CACHE: "0"
  UV_LINK_MODE: symlink
  UV_INDEX_STRATEGY: unsafe-best-match
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: "1"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  fast-unit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          python -m pip install --upgrade pip uv wheel_stub setuptools wheel
          if ($LASTEXITCODE -ne 0) { throw "install uv failed" }
          $IndexStrategy = if ([string]::IsNullOrWhiteSpace($env:UV_INDEX_STRATEGY)) { "unsafe-best-match" } else { $env:UV_INDEX_STRATEGY }
          if (-not (Test-Path "uv.lock")) {
            uv lock --index-strategy $IndexStrategy
            if ($LASTEXITCODE -ne 0) { throw "uv lock failed" }
            if (-not (Test-Path "uv.lock")) { throw "uv lock did not produce uv.lock" }
          }
          uv sync --frozen --group test
          if ($LASTEXITCODE -ne 0) { throw "uv sync failed" }

      - name: Run fast unit suite
        run: |
          uv run --group test python -m pytest tests/test_provider_catalog.py tests/test_scene_detection.py tests/test_runtime_backends.py tests/test_tag_highlighting.py tests/test_process_runner_tail_parser.py tests/test_log_viewer_scroll_state.py tests/test_lance_blob.py tests/test_lance_utils.py tests/test_text_translation_pipeline.py tests/test_path_safety.py tests/test_output_writer.py tests/test_caption_pipeline.py tests/test_runtime_config.py tests/test_ocr_output_writer_adoption.py -q

  provider-v2:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          python -m pip install --upgrade pip uv wheel_stub setuptools wheel
          if ($LASTEXITCODE -ne 0) { throw "install uv failed" }
          $IndexStrategy = if ([string]::IsNullOrWhiteSpace($env:UV_INDEX_STRATEGY)) { "unsafe-best-match" } else { $env:UV_INDEX_STRATEGY }
          if (-not (Test-Path "uv.lock")) {
            uv lock --index-strategy $IndexStrategy
            if ($LASTEXITCODE -ne 0) { throw "uv lock failed" }
            if (-not (Test-Path "uv.lock")) { throw "uv lock did not produce uv.lock" }
          }
          uv sync --frozen --group test
          if ($LASTEXITCODE -ne 0) { throw "uv sync failed" }

      - name: Run Provider V2 suite
        run: |
          uv run --group test python -m pytest tests/test_provider_v2.py tests/test_provider_registry.py tests/test_provider_routes.py tests/test_api_handler_v2.py -q --durations=20
