name: Provider V2 Tests

on:
  push:
    branches: [main]
    paths:
      - "module/providers/**"
      - "module/api_handler_v2.py"
      - "tests/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "module/providers/**"
      - "module/api_handler_v2.py"
      - "tests/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --group test

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run --group test python -m pytest tests/test_provider_v2.py -v --tb=short
