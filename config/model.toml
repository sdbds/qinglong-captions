[moondream]
model_list."Moondream 3 Preview" = { model_id = "moondream/moondream3-preview", meta = { min_vram_gb = 6 } }
model_id = "moondream/moondream3-preview"
prompt = ""
reasoning = false
# Available task combinations (comma-separated list):
# - "caption": Generate image descriptions (short, normal, long)
# - "query": Ask open-ended questions about images (supports reasoning mode)
# - "point": Identify specific points (x, y coordinates) for objects in an image
# - "detect": Provide bounding boxes for objects in an image
# Examples:
#   tasks = "caption" (default: only caption generation)
#   tasks = "caption,query" (caption + VQA)
#   tasks = "query,point,detect" (VQA + point + detect)
#   tasks = "all" (all available tasks)
tasks = "caption"

