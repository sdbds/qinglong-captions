# Gemma 4 multimodal local runtime configuration
# Shared route provider for image / video / audio.
[gemma4_local]
model_list."Gemma 4 E2B it" = { model_id = "google/gemma-4-E2B-it", meta = { min_vram_gb = 10 } }
model_list."Gemma 4 E4B it" = { model_id = "google/gemma-4-E4B-it", meta = { min_vram_gb = 16 } }
model_list."Gemma 4 E2B it FP8 Dynamic" = { model_id = "leon-se/gemma-4-E2B-it-FP8-Dynamic", meta = { min_vram_gb = 8 } }
model_list."Gemma 4 E4B it FP8" = { model_id = "protoLabsAI/gemma-4-E4B-it-FP8", meta = { min_vram_gb = 12 } }
model_list."Gemma 4 26B A4B it" = { model_id = "google/gemma-4-26B-A4B-it", meta = { min_vram_gb = 48 } }
model_list."Gemma 4 31B it" = { model_id = "google/gemma-4-31B-it", meta = { min_vram_gb = 64 } }
model_list."Gemma 4 31B it FP8 Block" = { model_id = "RedHatAI/gemma-4-31B-it-FP8-block", meta = { min_vram_gb = 32 } }
# Note: Gemma 4 26B/31B variants are text-image only. Audio stays on E2B/E4B variants.
model_id = "google/gemma-4-E4B-it"
audio_task = "asr"
runtime_backend = "direct"
max_new_tokens = 2048
temperature = 0.0
top_p = 1.0
